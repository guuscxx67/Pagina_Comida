<header class="header navbar navbar-expand-lg navbar-light">
  <div class="container-fluid">
    <a class="navbar-brand logo-brand" routerLink="/home">
      <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="35" rx="28" ry="8" fill="#8B6F47"></ellipse>
        <path d="M 22 35 Q 20 50 25 65 Q 30 75 50 78 Q 70 75 75 65 Q 80 50 78 35" fill="#A0826D" stroke="#8B6F47" stroke-width="1"></path>
        <ellipse cx="65" cy="20" rx="4" ry="12" fill="#D4A574"></ellipse>
        <circle cx="73" cy="12" r="6" fill="#D4A574"></circle>
        <line x1="65" y1="32" x2="73" y2="12" stroke="#8B6F47" stroke-width="1"></line>
      </svg>
      <span class="brand-text">Garnachas el tommy</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item" *ngIf="usuario">
          <span class="nav-link user-greeting">Bienvenido, {{ usuario.nombre }}</span>
        </li>
        <li class="nav-item" *ngIf="usuario?.es_admin">
          <a class="nav-link" routerLink="/admin">ADMIN</a>
        </li>
        <li class="nav-item" *ngIf="usuario">
          <button class="btn btn-link nav-link" style="text-decoration:none" (click)="cerrarSesion()">SALIR</button>
        </li>
        <li class="nav-item" *ngIf="!usuario">
          <a class="nav-link" routerLink="/profile">INICIAR SESIÓN</a>
        </li>
        <li class="nav-item" *ngIf="!usuario">
          <a class="nav-link" routerLink="/register">REGISTRARSE</a>
        </li>
      </ul>
    </div>
  </div>
</header>
