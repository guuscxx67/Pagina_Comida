<section class="options-section">
  <div class="container-fluid">
    <h2 class="options-title">¿QUÉ SE TE ANTOJA HOY?</h2>
    <div class="options-grid">

      <div class="option-card card-reserva" (click)="reservarPedido()">
        <div class="card-body-content">
          <h3 class="card-heading">RESERVA TU PLATILLO</h3>
          <p class="card-desc">Aparta tu lugar y llega sin esperas. Tu comida te estará esperando lista y caliente.</p>
          <span class="card-cta">Reservar ahora →</span>
        </div>
      </div>

      <div class="option-card card-recoger" (click)="recogerPedido()">
        <div class="card-body-content">
          <h3 class="card-heading">ORDENAR PARA RECOGER</h3>
          <p class="card-desc">Ordena en línea y recoge tu comida caliente cuando gustes, sin tiempo de espera.</p>
          <span class="card-cta">Ordenar ahora →</span>
        </div>
      </div>

    </div>
  </div>
</section>
