<div class="modal-overlay" *ngIf="visible" (click)="cancelar()">
  <div class="modal-box" [class]="data?.tipo" (click)="$event.stopPropagation()">
    <button class="modal-close" type="button" aria-label="Cerrar mensaje" (click)="cancelar()">×</button>
    <div class="modal-icon">
      <span *ngIf="data?.tipo === 'exito'">&#10003;</span>
      <span *ngIf="data?.tipo === 'error'">&#10007;</span>
      <span *ngIf="data?.tipo === 'alerta'">!</span>
      <i *ngIf="data?.tipo === 'confirmar'" class="fa-solid fa-triangle-exclamation"></i>
    </div>
    <h3 class="modal-title">{{ data?.titulo }}</h3>
    <p class="modal-message">{{ data?.mensaje }}</p>
    <div class="modal-actions">
      <button *ngIf="data?.tipo === 'confirmar'" class="btn-modal btn-cancel" (click)="cancelar()">
        <i class="fa-solid fa-xmark"></i> {{ data?.textoCancelar || 'No' }}
      </button>
      <button class="btn-modal btn-accept" [class]="'btn-' + data?.tipo" (click)="aceptar()">
        <i *ngIf="data?.tipo === 'confirmar'" class="fa-solid fa-check"></i>
        {{ data?.tipo === 'confirmar' ? (data?.textoConfirmar || 'Si') : 'Aceptar' }}
      </button>
    </div>
  </div>
</div>
