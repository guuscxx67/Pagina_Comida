<section class="hero-section">
  <div class="hero-background">
    <!-- Pattern background with kitchen utensils -->
    <div class="utensils-pattern">
      <svg class="utensil" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" style="top: 10%; left: 10%; transform: rotate(45deg);">
        <path d="M25 5 L22 20 L28 20 Z" fill="rgba(139, 111, 71, 0.1)" stroke="rgba(139, 111, 71, 0.15)"></path>
      </svg>
      <svg class="utensil" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" style="top: 20%; right: 15%; transform: rotate(-30deg);">
        <circle cx="25" cy="15" r="8" fill="rgba(139, 111, 71, 0.1)" stroke="rgba(139, 111, 71, 0.15)"></circle>
        <line x1="25" y1="23" x2="25" y2="45" stroke="rgba(139, 111, 71, 0.15)" stroke-width="2"></line>
      </svg>
      <svg class="utensil" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" style="bottom: 15%; left: 20%; transform: rotate(60deg);">
        <path d="M10 10 L40 10 L40 15 L10 15 Z" fill="rgba(139, 111, 71, 0.1)"></path>
        <line x1="25" y1="15" x2="25" y2="40" stroke="rgba(139, 111, 71, 0.15)" stroke-width="1.5"></line>
      </svg>
    </div>
  </div>

  <div class="container-fluid">
    <div class="hero-content">
      <div class="hero-left">
        <h1 class="hero-title">Tenemos la mejor comida casera de México</h1>
        <div class="hero-arrow">→</div>
        <p class="hero-price">$210 Comida completa del dia</p>
        <div class="chef-illustration">
          <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
            <!-- Chef hat -->
            <ellipse cx="50" cy="20" rx="25" ry="12" fill="#FFFFFF" stroke="#333" stroke-width="1.5"></ellipse>
            <rect x="30" y="20" width="40" height="15" fill="#FFFFFF" stroke="#333" stroke-width="1.5"></rect>
            <!-- Chef face -->
            <circle cx="50" cy="50" r="18" fill="#D4A574"></circle>
            <!-- Chef eyes and smile -->
            <circle cx="44" cy="46" r="2" fill="#333"></circle>
            <circle cx="56" cy="46" r="2" fill="#333"></circle>
            <path d="M 44 52 Q 50 55 56 52" stroke="#333" stroke-width="1.5" fill="none"></path>
            <!-- Chef body (traditional garment) -->
            <path d="M 35 68 L 32 120 L 68 120 L 65 68 Z" fill="#E8D4C4" stroke="#333" stroke-width="1.5"></path>
            <!-- Chef apron -->
            <path d="M 42 68 L 40 115 L 60 115 L 58 68 Z" fill="#8B4513" stroke="#333" stroke-width="1.5"></path>
          </svg>
        </div>
      </div>

      <div class="hero-right">
        <div class="dish-container">
          <div class="dish-label">Comida</div>
          <div class="dish-image">
            <img src="logo.png" alt="Comida casera" />
          </div>
          <div class="dish-label-bottom">Hecho con Amor y Drogas</div>
        </div>
      </div>
    </div>
  </div>
</section>
