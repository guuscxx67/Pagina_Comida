<div class="profile-container" *ngIf="usuario">
  <div class="profile-card">
    <div class="profile-header">
      <div>
        <p class="profile-eyebrow">Tu cuenta</p>
        <h2>Mi perfil editable</h2>
        <p class="profile-subtitle">Actualiza tu informacion personal cuando lo necesites.</p>
      </div>
      <button class="btn-secondary" (click)="cerrarSesion()">Cerrar sesion</button>
    </div>

    <div class="profile-form">
      <label>
        <span>Nombre</span>
        <input [(ngModel)]="nombre" placeholder="Nombre completo" type="text" />
      </label>

      <label>
        <span>Correo</span>
        <input [(ngModel)]="email" placeholder="Correo electronico" type="email" />
      </label>

      <label>
        <span>Telefono</span>
        <input [(ngModel)]="telefono" placeholder="Telefono" type="tel" />
      </label>

      <label>
        <span>Nueva contrasena</span>
        <input [(ngModel)]="nuevaPassword" placeholder="Deja vacio si no quieres cambiarla" type="password" />
      </label>
    </div>

    <div class="profile-actions">
      <button class="btn-primary" (click)="guardarCambios()" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : 'Guardar cambios' }}
      </button>
    </div>
  </div>

  <div class="orders-section">
    <h3>Mis pedidos</h3>
    <div *ngFor="let p of pedidos" class="pedido-card">
      <p><b>Pedido #{{ p.id }}</b> - {{ p.tipo }} - <span>{{ p.estado }}</span></p>
      <p>Total: ${{ p.total }}</p>
    </div>
    <p *ngIf="pedidos.length === 0">No tienes pedidos aun.</p>
  </div>
</div>
