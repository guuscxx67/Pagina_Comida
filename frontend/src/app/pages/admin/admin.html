<div class="admin-container">
  <div class="admin-header">
    <h2>Panel del Administrador</h2>
    <div class="admin-header-actions">
      <button class="btn-home" routerLink="/home">Ir al Inicio</button>
      <button class="btn-logout" (click)="cerrarSesion()">Cerrar sesión</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn" [class.active]="activeTab === 'dashboard'" (click)="activeTab = 'dashboard'">
      Panel de Control
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'recetas'" (click)="activeTab = 'recetas'">
      Productos <span class="badge">{{ recetas.length }}</span>
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'menu'" (click)="activeTab = 'menu'">
      Menú
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'pedidos'" (click)="activeTab = 'pedidos'">
      Pedidos
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'platos-estrella'" (click)="activeTab = 'platos-estrella'">
      Platos Estrella
    </button>
  </div>

  <app-admin-dashboard
    *ngIf="activeTab === 'dashboard'"
    [adminId]="adminId">
  </app-admin-dashboard>

  <app-admin-recetas
    *ngIf="activeTab === 'recetas'"
    [adminId]="adminId"
    (recetasActualizadas)="onRecetasActualizadas($event)">
  </app-admin-recetas>

  <app-admin-menu
    *ngIf="activeTab === 'menu'"
    [adminId]="adminId"
    [recetas]="recetas"
    (productoActualizado)="onProductoActualizado()">
  </app-admin-menu>

  <app-admin-pedidos
    *ngIf="activeTab === 'pedidos'"
    [adminId]="adminId">
  </app-admin-pedidos>

  <app-admin-platos-estrella
    *ngIf="activeTab === 'platos-estrella'"
    [adminId]="adminId"
    (platosActualizados)="onPlatosActualizados()">
  </app-admin-platos-estrella>
</div>
