<div class="section-header">
  <h3>Productos del Menú</h3>
  <div class="section-header-actions">
    <button class="btn-refresh" (click)="cargarRecetas()">&#8634; Actualizar</button>
    <button class="btn-nuevo" (click)="abrirFormNuevo()">+ Nuevo Producto</button>
  </div>
</div>

<!-- Modal para el formulario -->
<div *ngIf="formVisible" class="modal-overlay" (click)="cerrarModal($event)">
  <div class="modal-form" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h4>{{ editandoId ? 'Editar Producto' : 'Nuevo Producto' }}</h4>
      <button class="modal-close" (click)="cancelarForm()">×</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" [(ngModel)]="form.nombre" placeholder="Ej. Enchiladas Verdes" />
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <input type="text" [(ngModel)]="form.descripcion" placeholder="Breve descripción del platillo" />
      </div>

      <div class="form-group">
        <label>Precio *</label>
        <input type="number" [(ngModel)]="form.precio" min="0" step="0.5" />
        <small *ngIf="form.precio <= 0" class="error-message">El precio debe ser mayor a 0</small>
      </div>

      <div class="form-group">
        <label>Categoría</label>
        <select [(ngModel)]="form.categoria">
          <option *ngFor="let cat of categorias" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Imagen</label>
        <select [(ngModel)]="form.imagen">
          <option value="">— Sin imagen —</option>
          <option *ngFor="let img of imagenesDisponibles" [value]="img">{{ img }}</option>
        </select>
        <div class="imagen-upload">
          <label class="btn btn-subir-img">
            Subir nueva imagen
            <input type="file" accept="image/*" (change)="subirImagen($event)" hidden />
          </label>
        </div>

        <div *ngIf="form.imagen" class="imagen-preview">
          <img [src]="imagenUrl(form.imagen)" alt="Vista previa" />
        </div>
      </div>

      <div class="form-group check-group">
        <label class="check-label">
          <input type="checkbox" [(ngModel)]="form.disponible" />
          Disponible para ordenar
        </label>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-cancelar-form" (click)="cancelarForm()">Cancelar</button>
      <button class="btn btn-guardar" (click)="guardarReceta()" [disabled]="!form.nombre.trim() || form.precio <= 0">Guardar</button>
    </div>
  </div>
</div>

<p *ngIf="recetas.length === 0 && !formVisible" class="empty-msg">No hay productos. Agrega el primero.</p>

<div class="recetas-grid">
  <div *ngFor="let r of recetas" class="card receta-card" [class.no-disponible]="!r.disponible">
    <div *ngIf="r.imagen" class="receta-image">
      <img [src]="imagenUrl(r.imagen)" [alt]="r.nombre" />
    </div>
    <div class="receta-header">
      <span class="receta-cat">{{ r.categoria }}</span>
      <span class="receta-precio">${{ r.precio }}</span>
    </div>
    <h4>{{ r.nombre }}</h4>
    <p class="receta-desc">{{ r.descripcion }}</p>
    <p *ngIf="!r.disponible" class="no-disp-label">— No disponible —</p>
    <div class="receta-actions">
      <button class="btn btn-editar" (click)="editarReceta(r)">Editar</button>
      <button 
        class="btn btn-estrella" 
        [class.active]="esPlatoEstrella(r.id)"
        (click)="togglePlatoEstrella(r)"
        [title]="esPlatoEstrella(r.id) ? 'Quitar de Platos Estrella' : 'Agregar a Platos Estrella'">
        <i class="fa-solid fa-star" *ngIf="esPlatoEstrella(r.id)"></i><i class="fa-regular fa-star" *ngIf="!esPlatoEstrella(r.id)"></i>
      </button>
      <button class="btn btn-toggle" (click)="toggleDisponible(r)">
        {{ r.disponible ? 'Deshabilitar' : 'Habilitar' }}
      </button>
      <button class="btn btn-eliminar" (click)="eliminarReceta(r.id)">Eliminar</button>
    </div>
  </div>
</div>
