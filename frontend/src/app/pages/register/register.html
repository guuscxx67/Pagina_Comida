<div class="register-container">
  <div class="modo-toggle">
    <button [class.active]="modo === 'login'" (click)="modo = 'login'">Iniciar Sesión</button>
    <button [class.active]="modo === 'registro'" (click)="modo = 'registro'">Crear Cuenta</button>
  </div>

  <div *ngIf="modo === 'login'" class="form-section">
    <h2>Iniciar Sesión</h2>
    <input [(ngModel)]="loginEmail" placeholder="Correo electrónico" type="email" />
    <input [(ngModel)]="loginPassword" placeholder="Contraseña" type="password"
           (keydown.enter)="iniciarSesion()" />
    <button class="btn-primary" (click)="iniciarSesion()">Entrar</button>
    <p class="hint">Admin: admin&#64;test.com / 123456</p>
  </div>
  <div *ngIf="modo === 'registro'" class="form-section">
    <h2>Nueva Cuenta</h2>
    <input [(ngModel)]="nombre" placeholder="Nombre completo" />
    <input [(ngModel)]="email" placeholder="Correo electrónico" type="email" />
    <input [(ngModel)]="password" placeholder="Contraseña" type="password" />
    <input [(ngModel)]="telefono" placeholder="Teléfono (opcional)" />
    <button class="btn-primary" (click)="registrar()">Crear cuenta</button>
  </div>
</div>
