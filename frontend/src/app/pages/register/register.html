<div class="auth-page">
  <div class="auth-side">
    <div class="auth-side-content">
      <img src="logo2.png" alt="Garnachas Tommy" class="auth-logo" />
      <h1 class="auth-brand">Garnachas Tommy</h1>
      <p class="auth-tagline">Sabor de drogas en cada bocado</p>
      <div class="auth-decoration">
        <div class="deco-circle deco-1"></div>
        <div class="deco-circle deco-2"></div>
        <div class="deco-circle deco-3"></div>
      </div>
    </div>
  </div>
  <div class="auth-main">
    <div class="auth-card">
      <div class="auth-tabs">
        <button
          class="auth-tab"
          [class.active]="modo === 'login'"
          (click)="modo = 'login'">
          <span class="tab-icon"><i class="fa-solid fa-right-to-bracket"></i></span>
          Iniciar Sesion
        </button>
        <button
          class="auth-tab"
          [class.active]="modo === 'registro'"
          (click)="modo = 'registro'">
          <span class="tab-icon"><i class="fa-solid fa-user-plus"></i></span>
          Crear Cuenta
        </button>
        <div class="tab-indicator" [class.right]="modo === 'registro'"></div>
      </div>

      <div class="auth-form" *ngIf="modo === 'login'" [@fadeSlide]>
        <h2 class="auth-title">Bienvenido de vuelta</h2>
        <p class="auth-subtitle">Ingresa tus datos para continuar</p>

        <div class="input-group">
          <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
          <input
            type="email"
            [(ngModel)]="loginEmail"
            placeholder="Correo electronico"
            autocomplete="email" />
        </div>

        <div class="input-group">
          <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
          <input
            type="password"
            [(ngModel)]="loginPassword"
            placeholder="Contrasena"
            (keydown.enter)="iniciarSesion()"
            autocomplete="current-password" />
          <button class="toggle-pass" (click)="mostrarPass = !mostrarPass" type="button">
            <i class="fa-solid" [class.fa-eye]="mostrarPass" [class.fa-eye-slash]="!mostrarPass"></i>
          </button>
        </div>

        <button
          class="btn-auth"
          (click)="iniciarSesion()"
          [disabled]="cargando">
          <span *ngIf="!cargando">Entrar</span>
          <span *ngIf="cargando" class="spinner"></span>
        </button>

        <p class="auth-switch">
          ¿No tienes cuenta?
          <a (click)="modo = 'registro'">Crea una aqui</a>
        </p>
      </div>

      <div class="auth-form" *ngIf="modo === 'registro'" [@fadeSlide]>
        <h2 class="auth-title">Crea tu cuenta</h2>
        <p class="auth-subtitle">Unete y ordena tu comida favorita</p>

        <div class="input-group">
          <span class="input-icon"><i class="fa-solid fa-user"></i></span>
          <input
            type="text"
            [(ngModel)]="nombre"
            placeholder="Nombre completo"
            autocomplete="name" />
        </div>

        <div class="input-group">
          <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="Correo electronico"
            autocomplete="email" />
        </div>

        <div class="input-group">
          <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
          <input
            type="password"
            [(ngModel)]="password"
            placeholder="Contrasena"
            autocomplete="new-password" />
        </div>

        <div class="input-group">
          <span class="input-icon"><i class="fa-solid fa-phone"></i></span>
          <input
            type="tel"
            [(ngModel)]="telefono"
            placeholder="Telefono (opcional)"
            autocomplete="tel" />
        </div>

        <button
          class="btn-auth"
          (click)="registrar()"
          [disabled]="cargando">
          <span *ngIf="!cargando">Crear cuenta</span>
          <span *ngIf="cargando" class="spinner"></span>
        </button>

        <p class="auth-switch">
          ¿Ya tienes cuenta?
          <a (click)="modo = 'login'">Inicia sesion</a>
        </p>
      </div>
    </div>
  </div>
</div>
